$mainMod = SUPER

# Abrir ghostty con CTRL+ALT+T
bind = CTRL ALT, T, exec, ghostty --title=scratchpad

# Otros atajos esenciales
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = ALT, S, exec, rofi -show drun -theme android_notification
bind = $mainMod, V, togglefloating,

# Movimiento de ventanas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# helium
bind = $mainMod, B, exec, ~/Descargas/helium-0.12.5.1-x86_64.AppImage > /dev/null 2>&1 &

# Screenshot
bind = , PRINT, exec, hyprshot -m region
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# Bloqueo
bind = $mainMod, L, exec, ~/.config/hypr/gen_lock.sh &&~/.config/hypr/gen_lock.sh && hyprlock

# Mover entre workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mover a workspace
bind = $mainMod, 1, exec, hyprctl dispatch workspace 1
bind = $mainMod, 2, exec, hyprctl dispatch workspace 2
bind = $mainMod, 3, exec, hyprctl dispatch workspace 3
bind = $mainMod, 4, exec, hyprctl dispatch workspace 4
bind = $mainMod, 5, exec, hyprctl dispatch workspace 5
bind = $mainMod, 6, exec, hyprctl dispatch workspace 6
bind = $mainMod, 7, exec, hyprctl dispatch workspace 7
bind = $mainMod, 8, exec, hyprctl dispatch workspace 8
bind = $mainMod, 9, exec, hyprctl dispatch workspace 9
bind = $mainMod, 0, exec, hyprctl dispatch workspace 10

# Mover en workspace
bind = $mainMod CTRL, H, swapwindow, l
bind = $mainMod CTRL, J, swapwindow, r
bind = $mainMod CTRL, K, swapwindow, u
bind = $mainMod CTRL, L, swapwindow, d

# Volumen
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brillo
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Ventiladores
bind = , F5, exec, ~/.local/bin/fan-toggle.sh toggle
