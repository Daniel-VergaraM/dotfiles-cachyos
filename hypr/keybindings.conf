$mainMod = SUPER

# Abrir ghostty con CTRL+ALT+T
bind = CTRL ALT, T, exec, ghostty --title=scratchpad

# Otros atajos esenciales
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = ALT, S, exec, wofi --show drun
bind = $mainMod, V, togglefloating,

# Movimiento de ventanas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# helium
bind = $mainMod, B, exec, ~/Descargas/helium-0.12.5.1-x86_64.AppImage > /dev/null 2>&1 &

# Screenshot
bind = , PRINT, exec, hyprshot -m region
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# Bloqueo
bind = $mainMod, L, exec, ~/.config/hypr/gen_lock.sh &&~/.config/hypr/gen_lock.sh && hyprlock

# Mover entre workspaces
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# Mover en workspace
bind = SUPER CTRL, H, swapwindow, l
bind = SUPER CTRL, J, swapwindow, r
bind = SUPER CTRL, K, swapwindow, u
bind = SUPER CTRL, L, swapwindow, d

# Volumen
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brillo
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Ventiladores
bind = , F5, exec, ~/.local/bin/fan-toggle.sh toggle
